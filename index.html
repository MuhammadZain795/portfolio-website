<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M Zain — Back Online Shortly</title>
  <meta name="description" content="Backend engineer for FinTech and ZATCA-compliant systems. Site is being polished — back online shortly." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #0a1628;
      --muted: #475569;
      --soft: #94a3b8;
      --accent: #10b981;
      --accent-2: #059669;
      --accent-soft: #ecfdf5;
      --line: #e2e8f0;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(800px 320px at 80% 10%, rgba(16, 185, 129, 0.10), transparent 60%),
        radial-gradient(700px 280px at 10% 90%, rgba(10, 22, 40, 0.04), transparent 60%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      overflow: hidden;
    }
    body::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(10, 22, 40, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(10, 22, 40, 0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
      opacity: .5;
      z-index: 0;
    }
    .wrap {
      max-width: 560px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .brand-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--ink); color: var(--accent);
      font-weight: 800; font-size: 18px; letter-spacing: 0.5px;
      margin-bottom: 32px;
      box-shadow: 0 8px 24px rgba(10, 22, 40, 0.08);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent-2);
      font-size: 13px; font-weight: 600; letter-spacing: 0.1px;
      border: 1px solid rgba(16, 185, 129, 0.2);
      margin-bottom: 28px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2); }
      50%      { box-shadow: 0 0 0 7px rgba(16, 185, 129, 0.08); }
    }
    h1 {
      font-size: clamp(34px, 5.5vw, 48px);
      letter-spacing: -0.025em;
      line-height: 1.1;
      margin: 0 0 18px;
      font-weight: 800;
    }
    .accent { color: var(--accent-2); }
    p {
      font-size: 17px;
      color: var(--muted);
      margin: 0 auto;
      line-height: 1.6;
      max-width: 46ch;
    }
    .meta {
      margin-top: 40px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      color: var(--soft);
      letter-spacing: 0.02em;
    }
    .meta a {
      color: var(--accent-2);
      text-decoration: none;
      font-weight: 600;
    }
    .meta a:hover { color: var(--ink); }
    .role {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--soft);
      font-weight: 600;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand-mark">MZ</div>

    <div class="eyebrow">
      <span class="dot"></span> Building something better
    </div>

    <p class="role">Muhammad Zain Ul Abdin</p>
    <h1>The site's getting <span class="accent">a polish</span>.<br/>Back online shortly.</h1>
    <p>Backend engineer for FinTech, banking, and ZATCA-compliant systems. Currently iterating on a sharper version of this page.</p>

    <div class="meta">
      Urgent inquiries: <a href="mailto:muhammadzainulabdin123@gmail.com">muhammadzainulabdin123@gmail.com</a>
    </div>
  </main>
</body>
</html>
