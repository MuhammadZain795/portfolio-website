<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <meta name="description" content="Something new is on the way." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #0a1628;
      --muted: #475569;
      --soft: #94a3b8;
      --accent: #10b981;
      --accent-2: #059669;
      --accent-soft: #ecfdf5;
      --line: #e2e8f0;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(800px 320px at 80% 10%, rgba(16, 185, 129, 0.10), transparent 60%),
        radial-gradient(700px 280px at 10% 90%, rgba(10, 22, 40, 0.04), transparent 60%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      overflow: hidden;
    }
    body::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(10, 22, 40, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(10, 22, 40, 0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
      opacity: .5;
      z-index: 0;
    }
    .wrap {
      max-width: 520px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent-2);
      font-size: 13px; font-weight: 600; letter-spacing: 0.1px;
      border: 1px solid rgba(16, 185, 129, 0.2);
      margin-bottom: 32px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2); }
      50%      { box-shadow: 0 0 0 7px rgba(16, 185, 129, 0.08); }
    }
    h1 {
      font-size: clamp(48px, 8vw, 88px);
      letter-spacing: -0.035em;
      line-height: 1;
      margin: 0 0 20px;
      font-weight: 800;
    }
    .accent { color: var(--accent-2); }
    p {
      font-size: 17px;
      color: var(--muted);
      margin: 0 auto;
      line-height: 1.6;
      max-width: 38ch;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">
      <span class="dot"></span> Building something new
    </div>
    <h1>Coming <span class="accent">soon</span>.</h1>
    <p>Something new is on the way.</p>
  </main>
</body>
</html>
